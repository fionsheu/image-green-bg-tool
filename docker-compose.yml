
version: "3"

services:

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8989:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
